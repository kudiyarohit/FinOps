{% extends "base_public.html" %}
{% block content %}

<style>

/* BACKGROUND */
body {
    background: linear-gradient(135deg, #f8fafc, #eef2ff);
}

/* CENTER */
.signup-wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 90vh;
}

/* CARD */
.signup-card {
    width: 420px;
    background: white;
    padding: 40px;
    border-radius: 16px;
    box-shadow: 0 25px 60px rgba(0,0,0,0.08);
    animation: fadeIn 0.5s ease;
}

/* TITLE */
.signup-card h2 {
    margin-bottom: 10px;
    text-align: center;
}

/* SUBTEXT */
.subtitle {
    text-align: center;
    font-size: 14px;
    color: #6b7280;
    margin-bottom: 25px;
}

/* INPUT */
.signup-card input {
    width: 100%;
    padding: 14px;
    margin-bottom: 15px;
    border-radius: 10px;
    border: 1px solid #e5e7eb;
    transition: 0.2s;
}

/* FOCUS */
.signup-card input:focus {
    border-color: #2563eb;
    outline: none;
    box-shadow: 0 0 0 3px rgba(37,99,235,0.15);
}

/* PASSWORD WRAPPER */
.password-wrapper {
    position: relative;
}

/* TOGGLE */
.toggle-password {
    position: absolute;
    right: 12px;
    top: 12px;
    cursor: pointer;
    font-size: 14px;
    color: #2563eb;
}

/* BUTTON */
.signup-btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #f59e0b, #f97316);
    border: none;
    color: white;
    font-weight: 600;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.25s;
}

.signup-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(249,115,22,0.3);
}

.signup-btn:disabled {
    opacity: 0.7;
    cursor: not-allowed;
}

/* STATUS */
.status {
    margin-top: 12px;
    font-size: 14px;
    text-align: center;
}

.error { color: #dc2626; }
.success { color: #16a34a; }

/* BACK LINK */
.back-link {
    text-align: center;
    margin-top: 15px;
}

.back-link a {
    color: #2563eb;
    text-decoration: none;
}

/* ANIMATION */
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(25px);}
    to { opacity: 1; transform: translateY(0);}
}

</style>

<div class="signup-wrapper">

    <div class="signup-card">

        <h2>Set New Password</h2>
        <p class="subtitle">Choose a strong password to secure your account</p>

        <!-- PASSWORD -->
        <div class="password-wrapper">
            <input id="password" type="password" placeholder="New password">
            <span class="toggle-password" onclick="togglePassword('password', this)">Show</span>
        </div>

        <!-- CONFIRM PASSWORD -->
        <div class="password-wrapper">
            <input id="confirmPassword" type="password" placeholder="Confirm password">
            <span class="toggle-password" onclick="togglePassword('confirmPassword', this)">Show</span>
        </div>

        <button id="resetBtn" class="signup-btn" onclick="resetPassword()">
            Reset Password
        </button>

        <p id="status" class="status"></p>

        <div class="back-link">
            <a href="/login">← Back to login</a>
        </div>

    </div>

</div>

<script>

function togglePassword(id, el) {
    const input = document.getElementById(id);

    if (input.type === "password") {
        input.type = "text";
        el.innerText = "Hide";
    } else {
        input.type = "password";
        el.innerText = "Show";
    }
}

async function resetPassword() {

    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirmPassword").value;
    const email = localStorage.getItem("email");
    const status = document.getElementById("status");
    const btn = document.getElementById("resetBtn");

    if (!password || !confirmPassword) {
        status.innerText = "Please fill all fields";
        status.className = "status error";
        return;
    }

    if (password !== confirmPassword) {
        status.innerText = "Passwords do not match";
        status.className = "status error";
        return;
    }

    if (password.length < 6) {
        status.innerText = "Password must be at least 6 characters";
        status.className = "status error";
        return;
    }

    btn.disabled = true;
    btn.innerText = "Updating...";

    try {
        const res = await fetch("/auth/reset-password", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ email, password })
        });

        const data = await res.json();
        status.innerText = data.message;

        if (res.ok) {
            status.className = "status success";

            localStorage.removeItem("email");

            setTimeout(() => {
                window.location.href = "/login";
            }, 1500);

        } else {
            status.className = "status error";
        }

    } catch (err) {
        status.innerText = "Something went wrong";
        status.className = "status error";
    }

    btn.disabled = false;
    btn.innerText = "Reset Password";
}

</script>

{% endblock %}
