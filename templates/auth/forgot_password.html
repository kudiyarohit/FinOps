{% extends "base_public.html" %}
{% block content %}

<style>

/* BACKGROUND GLOW */
body {
    background: linear-gradient(135deg, #f8fafc, #eef2ff);
}

/* CENTER */
.signup-wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 90vh;
}

/* CARD */
.signup-card {
    width: 400px;
    background: white;
    padding: 40px;
    border-radius: 16px;
    box-shadow: 0 25px 60px rgba(0,0,0,0.08);
    animation: fadeIn 0.5s ease;
    text-align: center;
}

/* TITLE */
.signup-card h2 {
    margin-bottom: 10px;
    color: #111827;
}

/* SUBTEXT */
.subtitle {
    font-size: 14px;
    color: #6b7280;
    margin-bottom: 25px;
}

/* INPUT */
.signup-card input {
    width: 100%;
    padding: 14px;
    margin-bottom: 18px;
    border: 1px solid #e5e7eb;
    border-radius: 10px;
    transition: all 0.2s ease;
    font-size: 14px;
}

/* INPUT FOCUS */
.signup-card input:focus {
    border-color: #2563eb;
    outline: none;
    box-shadow: 0 0 0 3px rgba(37,99,235,0.15);
}

/* BUTTON */
.signup-btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #f59e0b, #f97316);
    border: none;
    color: white;
    font-weight: 600;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.25s ease;
}

/* BUTTON HOVER */
.signup-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(249,115,22,0.3);
}

/* DISABLED */
.signup-btn:disabled {
    opacity: 0.7;
    cursor: not-allowed;
}

/* STATUS */
.status {
    margin-top: 12px;
    font-size: 14px;
}

.error { color: #dc2626; }
.success { color: #16a34a; }

/* BACK LINK */
.back-link {
    margin-top: 18px;
    font-size: 14px;
}

.back-link a {
    color: #2563eb;
    text-decoration: none;
}

/* ANIMATION */
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(25px);}
    to { opacity: 1; transform: translateY(0);}
}

</style>

<div class="signup-wrapper">

    <div class="signup-card">

        <h2>Reset your password</h2>
        <p class="subtitle">Enter your email and we'll send you a verification code</p>

        <input id="email" placeholder="Enter your email address">

        <button id="btn" class="signup-btn" onclick="sendOTP()">
            Send Verification Code
        </button>

        <p id="status" class="status"></p>

        <div class="back-link">
            <a href="/login">← Back to login</a>
        </div>

    </div>

</div>

<script>

async function sendOTP() {

    const email = document.getElementById("email").value;
    const status = document.getElementById("status");
    const btn = document.getElementById("btn");

    if (!email) {
        status.innerText = "Please enter your email";
        status.className = "status error";
        return;
    }

    btn.disabled = true;
    btn.innerText = "Sending...";

    try {
        const res = await fetch("/auth/forgot-password", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ email })
        });

        const data = await res.json();
        status.innerText = data.message;

        if (res.ok) {
            status.className = "status success";

            localStorage.setItem("email", email);

            setTimeout(() => {
                window.location.href = "/verify-reset-otp";
            }, 1200);

        } else {
            status.className = "status error";
        }

    } catch (err) {
        status.innerText = "Something went wrong";
        status.className = "status error";
    }

    btn.disabled = false;
    btn.innerText = "Send Verification Code";
}

</script>

{% endblock %}
