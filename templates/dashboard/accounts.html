{% extends "base.html" %}
{% block content %}

<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

  * { box-sizing: border-box; }

  :root {
    --bg: #020617;
    --surface: #0f172a;
    --surface2: #1e293b;
    --border: rgba(255,255,255,0.07);
    --text: #e2e8f0;
    --muted: #64748b;
    --blue: #3b82f6;
    --red: #ef4444;
    --green: #22c55e;
  }

  .page-wrap { padding: 32px; font-family: 'Inter', sans-serif; color: var(--text); }

  /* ── HEADER ── */
  .page-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 32px;
  }
  .page-header h1 { font-size: 22px; font-weight: 600; margin: 0; }
  .page-header p  { font-size: 13px; color: var(--muted); margin: 4px 0 0; }

  .add-btn {
    display: flex; align-items: center; gap: 8px;
    background: linear-gradient(135deg, #2563eb, #3b82f6);
    border: none; padding: 10px 20px; border-radius: 10px;
    color: white; font-weight: 500; font-size: 14px; cursor: pointer;
    transition: all 0.25s; box-shadow: 0 4px 15px rgba(59,130,246,0.3);
  }
  .add-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(59,130,246,0.4); }
  .add-btn svg { width: 16px; height: 16px; }

  /* ── GRID ── */
  .accounts-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 20px;
  }

  /* ── CARD ── */
  .account-card {
    background: linear-gradient(145deg, #0a1628, #0f172a);
    border: 1px solid var(--border);
    border-radius: 18px; padding: 22px;
    position: relative; overflow: hidden;
    transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
    animation: fadeUp 0.4s ease both;
  }
  .account-card::before {
    content: ''; position: absolute;
    left: 0; top: 15%; height: 70%; width: 3px;
    background: linear-gradient(180deg, #3b82f6, #60a5fa);
    border-radius: 0 4px 4px 0;
  }
  .account-card::after {
    content: ''; position: absolute;
    inset: 0; border-radius: 18px;
    background: radial-gradient(circle at 80% 20%, rgba(59,130,246,0.06), transparent 60%);
    pointer-events: none;
  }
  .account-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 20px 40px rgba(59,130,246,0.2);
    border-color: rgba(59,130,246,0.3);
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .account-card:nth-child(2) { animation-delay: 0.05s; }
  .account-card:nth-child(3) { animation-delay: 0.1s; }
  .account-card:nth-child(4) { animation-delay: 0.15s; }
  .account-card:nth-child(5) { animation-delay: 0.2s; }

  .card-top { display: flex; align-items: flex-start; justify-content: space-between; }
  .card-icon {
    width: 40px; height: 40px; border-radius: 10px;
    background: rgba(59,130,246,0.12);
    display: flex; align-items: center; justify-content: center;
    color: var(--blue);
  }
  .card-icon svg { width: 20px; height: 20px; }
  .card-badge {
    font-size: 10px; padding: 3px 9px; border-radius: 20px;
    background: rgba(34,197,94,0.12); color: #22c55e;
    border: 1px solid rgba(34,197,94,0.2); font-weight: 500;
  }
  .card-name { font-size: 16px; font-weight: 600; margin: 14px 0 4px; }
  .card-region { font-size: 13px; color: var(--muted); display: flex; align-items: center; gap: 5px; }
  .card-region svg { width: 12px; height: 12px; }

  /* ── AUTO SCAN SECTION ── */
  .auto-scan-bar {
    margin-top: 14px; padding: 12px 14px;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 10px;
  }
  .auto-scan-left { display: flex; align-items: center; gap: 10px; }
  .auto-scan-label { font-size: 12px; font-weight: 500; color: var(--muted); }
  .auto-scan-next {
    font-size: 10px; color: #475569; margin-top: 2px;
    display: none;
  }
  .auto-scan-next.visible { display: block; }

  /* Toggle switch */
  .toggle-wrap { display: flex; align-items: center; gap: 8px; }
  .toggle-switch {
    position: relative; width: 38px; height: 21px; cursor: pointer;
  }
  .toggle-switch input { opacity: 0; width: 0; height: 0; }
  .toggle-slider {
    position: absolute; inset: 0;
    background: rgba(255,255,255,0.1);
    border-radius: 21px;
    transition: 0.3s;
    border: 1px solid rgba(255,255,255,0.1);
  }
  .toggle-slider::before {
    content: ''; position: absolute;
    width: 15px; height: 15px; left: 2px; top: 50%;
    transform: translateY(-50%);
    background: #475569; border-radius: 50%;
    transition: 0.3s;
  }
  .toggle-switch input:checked + .toggle-slider {
    background: rgba(34,197,94,0.25);
    border-color: rgba(34,197,94,0.4);
  }
  .toggle-switch input:checked + .toggle-slider::before {
    background: #22c55e;
    transform: translateX(17px) translateY(-50%);
  }

  /* Interval dropdown */
  .interval-select {
    padding: 5px 10px; border-radius: 8px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    color: var(--text); font-size: 12px;
    cursor: pointer; outline: none;
    transition: all 0.2s; opacity: 0.4; pointer-events: none;
  }
  .interval-select.active { opacity: 1; pointer-events: auto; }
  .interval-select:focus { border-color: rgba(59,130,246,0.4); }
  .interval-select option { background: #0f172a; }

  .auto-scan-status {
    font-size: 10px; padding: 2px 8px; border-radius: 20px;
    font-weight: 500; display: none;
  }
  .auto-scan-status.on {
    display: inline-block;
    background: rgba(34,197,94,0.12); color: #22c55e;
    border: 1px solid rgba(34,197,94,0.2);
  }
  .auto-scan-status.off {
    display: inline-block;
    background: rgba(100,116,139,0.12); color: #64748b;
    border: 1px solid rgba(100,116,139,0.2);
  }

  /* ── CARD ACTIONS ── */
  .card-actions {
    display: flex; gap: 8px; margin-top: 14px; padding-top: 14px;
    border-top: 1px solid var(--border);
  }
  .btn-view {
    flex: 1; padding: 7px 0; border: 1px solid rgba(59,130,246,0.3);
    background: rgba(59,130,246,0.08); color: #60a5fa;
    border-radius: 8px; font-size: 12px; font-weight: 500; cursor: pointer;
    transition: all 0.2s;
  }
  .btn-view:hover { background: rgba(59,130,246,0.18); border-color: rgba(59,130,246,0.5); }
  .btn-del {
    padding: 7px 12px; border: 1px solid rgba(239,68,68,0.25);
    background: rgba(239,68,68,0.07); color: #f87171;
    border-radius: 8px; font-size: 12px; cursor: pointer; transition: all 0.2s;
  }
  .btn-del:hover { background: rgba(239,68,68,0.15); border-color: rgba(239,68,68,0.4); }

  /* ── EMPTY STATE ── */
  .empty-state {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 80px 20px; text-align: center;
  }
  .empty-icon {
    width: 64px; height: 64px; border-radius: 16px;
    background: rgba(59,130,246,0.08); border: 1px solid rgba(59,130,246,0.15);
    display: flex; align-items: center; justify-content: center;
    color: var(--blue); margin-bottom: 16px;
  }
  .empty-icon svg { width: 28px; height: 28px; }
  .empty-state h3 { font-size: 16px; font-weight: 600; margin: 0 0 8px; }
  .empty-state p  { font-size: 13px; color: var(--muted); max-width: 280px; }

  /* ── MODAL BACKDROP ── */
  .modal {
    position: fixed; inset: 0; display: none;
    align-items: center; justify-content: center;
    background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
    z-index: 9999;
  }
  .modal.show { display: flex; }

  /* ── MODAL BOX ── */
  .modal-box {
    background: linear-gradient(145deg, #0a1628, #0f1f3d);
    border: 1px solid rgba(59,130,246,0.2);
    border-radius: 20px; width: 440px; max-width: 95vw;
    padding: 32px; box-shadow: 0 40px 80px rgba(0,0,0,0.7);
    animation: popIn 0.25s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes popIn {
    from { transform: scale(0.88) translateY(20px); opacity: 0; }
    to   { transform: scale(1) translateY(0); opacity: 1; }
  }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
  .modal-header h3 { font-size: 17px; font-weight: 600; margin: 0; }
  .modal-close-x {
    width: 30px; height: 30px; border-radius: 8px;
    background: rgba(255,255,255,0.06); border: none;
    color: var(--muted); cursor: pointer; font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .modal-close-x:hover { background: rgba(255,255,255,0.12); color: var(--text); }

  /* ── FORM INPUTS ── */
  .field-group { margin-bottom: 16px; }
  .field-group label {
    display: block; font-size: 12px; font-weight: 500;
    color: var(--muted); margin-bottom: 6px; letter-spacing: 0.05em; text-transform: uppercase;
  }
  .field-group input {
    width: 100%; padding: 11px 14px;
    background: rgba(255,255,255,0.04); border: 1px solid var(--border);
    border-radius: 10px; color: var(--text); font-size: 14px; outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .field-group input:focus {
    border-color: rgba(59,130,246,0.5);
    box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
  }
  .field-group input::placeholder { color: #475569; }

  .modal-footer { display: flex; gap: 10px; margin-top: 24px; }
  .btn-cancel {
    flex: 1; padding: 11px; border: 1px solid var(--border);
    background: transparent; color: var(--muted);
    border-radius: 10px; font-size: 14px; cursor: pointer; transition: all 0.2s;
  }
  .btn-cancel:hover { background: rgba(255,255,255,0.05); color: var(--text); }
  .btn-save {
    flex: 2; padding: 11px; border: none;
    background: linear-gradient(135deg, #2563eb, #3b82f6);
    color: white; border-radius: 10px; font-size: 14px;
    font-weight: 500; cursor: pointer; transition: all 0.2s;
    box-shadow: 0 4px 15px rgba(59,130,246,0.3);
  }
  .btn-save:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(59,130,246,0.4); }
  .btn-save:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* ── VIEW MODAL ── */
  .detail-row {
    display: flex; flex-direction: column; gap: 3px;
    padding: 12px 0; border-bottom: 1px solid var(--border);
  }
  .detail-row:last-of-type { border-bottom: none; }
  .detail-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); }
  .detail-value { font-size: 14px; font-weight: 500; word-break: break-all; }

  .arn-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .arn-text { font-size: 13px; font-weight: 500; word-break: break-all; font-family: monospace; color: #93c5fd; }
  .toggle-arn {
    font-size: 11px; padding: 3px 9px; border-radius: 6px;
    background: rgba(255,255,255,0.06); border: 1px solid var(--border);
    color: var(--muted); cursor: pointer; white-space: nowrap; transition: all 0.2s;
  }
  .toggle-arn:hover { background: rgba(255,255,255,0.1); color: var(--text); }

  .view-footer { display: flex; gap: 10px; margin-top: 20px; }
  .btn-close-view {
    flex: 1; padding: 10px; background: rgba(255,255,255,0.05);
    border: 1px solid var(--border); color: var(--muted);
    border-radius: 10px; cursor: pointer; font-size: 13px; transition: all 0.2s;
  }
  .btn-close-view:hover { background: rgba(255,255,255,0.1); color: var(--text); }
  .btn-delete-acc {
    flex: 1; padding: 10px; background: rgba(239,68,68,0.08);
    border: 1px solid rgba(239,68,68,0.25); color: #f87171;
    border-radius: 10px; cursor: pointer; font-size: 13px; transition: all 0.2s;
  }
  .btn-delete-acc:hover { background: rgba(239,68,68,0.18); border-color: rgba(239,68,68,0.4); }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: 28px; right: 28px;
    background: #1e293b; border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 20px;
    font-size: 13px; color: var(--text); z-index: 99999;
    display: flex; align-items: center; gap: 10px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    transform: translateY(80px); opacity: 0;
    transition: all 0.35s cubic-bezier(0.34,1.56,0.64,1);
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { border-color: rgba(34,197,94,0.3); }
  .toast.error   { border-color: rgba(239,68,68,0.3); }
  .toast-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .toast.success .toast-dot { background: #22c55e; }
  .toast.error   .toast-dot { background: #ef4444; }
</style>

<div class="page-wrap">

  <!-- HEADER -->
  <div class="page-header">
    <div>
      <h1>AWS Accounts</h1>
      <p>Manage your connected cloud accounts</p>
    </div>
    <button class="add-btn" onclick="openAddModal()">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
      </svg>
      Connect Account
    </button>
  </div>

  <!-- GRID -->
  <div class="accounts-grid" id="accounts"></div>

</div>

<!-- ── ADD MODAL ── -->
<div class="modal" id="addModal">
  <div class="modal-box">
    <div class="modal-header">
      <h3>Connect AWS Account</h3>
      <button class="modal-close-x" onclick="closeAddModal()">×</button>
    </div>
    <div class="field-group">
      <label>Account Name</label>
      <input id="inp_name" placeholder="e.g. Production, Dev, Staging" />
    </div>
    <div class="field-group">
      <label>Role ARN</label>
      <input id="inp_arn" placeholder="arn:aws:iam::123456789:role/FinOpsRole" />
    </div>
    <div class="field-group">
      <label>Region</label>
      <input id="inp_region" placeholder="e.g. us-east-1, ap-south-1" />
    </div>
    <div id="add_err" style="font-size:13px;color:#f87171;min-height:18px;margin-top:-6px;"></div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeAddModal()">Cancel</button>
      <button class="btn-save" id="saveBtn" onclick="addAccount()">Connect Account</button>
    </div>
  </div>
</div>

<!-- ── VIEW MODAL ── -->
<div class="modal" id="viewModal">
  <div class="modal-box">
    <div class="modal-header">
      <h3>Account Details</h3>
      <button class="modal-close-x" onclick="closeViewModal()">×</button>
    </div>
    <div class="detail-row">
      <div class="detail-label">Account Name</div>
      <div class="detail-value" id="vName">—</div>
    </div>
    <div class="detail-row">
      <div class="detail-label">Region</div>
      <div class="detail-value" id="vRegion">—</div>
    </div>
    <div class="detail-row">
      <div class="detail-label">Role ARN</div>
      <div class="arn-row">
        <span class="arn-text" id="vArn">—</span>
        <button class="toggle-arn" id="arnToggleBtn" onclick="toggleArn()">Show</button>
      </div>
    </div>
    <div class="detail-row">
      <div class="detail-label">Last Scan</div>
      <div class="detail-value" id="vLastScan">Loading...</div>
    </div>
    <div class="view-footer">
      <button class="btn-close-view" onclick="closeViewModal()">Close</button>
      <button class="btn-delete-acc" id="vDeleteBtn">Delete Account</button>
    </div>
  </div>
</div>

<!-- ── TOAST ── -->
<div class="toast" id="toast">
  <div class="toast-dot"></div>
  <span id="toastMsg"></span>
</div>

<script>
  let selectedDeleteId = null;
  let fullArn = '';
  let arnVisible = false;

  // ── TOAST ──────────────────────────────────
  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.className = `toast ${type}`;
    document.getElementById('toastMsg').innerText = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3500);
  }

  // ── FORMAT NEXT SCAN TIME ──────────────────
  function formatNextScan(isoStr) {
    if (!isoStr) return '';
    const diff = new Date(isoStr) - new Date();
    if (diff <= 0) return 'Due now';
    const mins = Math.floor(diff / 60000);
    if (mins < 60) return `Next in ${mins}m`;
    const hrs = Math.floor(mins / 60);
    const rem = mins % 60;
    return rem > 0 ? `Next in ${hrs}h ${rem}m` : `Next in ${hrs}h`;
  }

  // ── LOAD ACCOUNTS ──────────────────────────
  async function loadAccounts() {
    const res  = await fetch('/aws/accounts', {
      headers: { Authorization: 'Bearer ' + localStorage.getItem('token') }
    });
    const data = await res.json();
    const container = document.getElementById('accounts');
    container.innerHTML = '';

    if (!data.accounts || data.accounts.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">
            <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4 4 0 003 15z"/>
            </svg>
          </div>
          <h3>No accounts connected</h3>
          <p>Connect your first AWS account to start scanning for security findings.</p>
        </div>`;
      return;
    }

    data.accounts.forEach((acc, i) => {
      const isEnabled   = acc.auto_scan_enabled;
      const intervalMin = acc.scan_interval_min || 60;
      const nextScanAt  = acc.next_scan_at;

      const intervals = [
        { val: 1,    label: 'Every 1 minute' },
        { val: 30,   label: 'Every 30 minutes' },
        { val: 60,   label: 'Every 1 hour' },
        { val: 120,  label: 'Every 2 hours' },
        { val: 360,  label: 'Every 6 hours' },
        { val: 720,  label: 'Every 12 hours' },
        { val: 1440, label: 'Every 24 hours' },
      ];

      const options = intervals.map(o =>
        `<option value="${o.val}" ${o.val === intervalMin ? 'selected' : ''}>${o.label}</option>`
      ).join('');

      const card = document.createElement('div');
      card.className = 'account-card';
      card.style.animationDelay = `${i * 0.06}s`;
      card.innerHTML = `
        <div class="card-top">
          <div class="card-icon">
            <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4 4 0 003 15z"/>
            </svg>
          </div>
          <span class="card-badge">Active</span>
        </div>

        <div class="card-name">${acc.account_name}</div>
        <div class="card-region">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
          </svg>
          ${acc.region}
        </div>

        <!-- AUTO SCAN BAR -->
        <div class="auto-scan-bar">
          <div class="auto-scan-left">
            <label class="toggle-switch" title="${isEnabled ? 'Disable' : 'Enable'} auto scan">
              <input
                type="checkbox"
                ${isEnabled ? 'checked' : ''}
                onchange="toggleAutoScan(this, ${acc.id})"
              />
              <span class="toggle-slider"></span>
            </label>
            <div>
              <div class="auto-scan-label">Auto Scan</div>
              <div class="auto-scan-next ${isEnabled && nextScanAt ? 'visible' : ''}" id="nextScan_${acc.id}">
                ${isEnabled && nextScanAt ? formatNextScan(nextScanAt) : ''}
              </div>
            </div>
          </div>
          <div style="display:flex; align-items:center; gap:8px;">
            <select
              class="interval-select ${isEnabled ? 'active' : ''}"
              id="interval_${acc.id}"
              onchange="changeInterval(${acc.id})"
            >
              ${options}
            </select>
            <span class="auto-scan-status ${isEnabled ? 'on' : 'off'}" id="autoStatus_${acc.id}">
              ${isEnabled ? 'ON' : 'OFF'}
            </span>
          </div>
        </div>

        <div class="card-actions">
          <button class="btn-view" onclick="openViewModal(${JSON.stringify(acc).replace(/'/g, '&#39;')})">
            View Details
          </button>
          <button class="btn-del" onclick="event.stopPropagation(); deleteAccount(${acc.id})">
            <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
            </svg>
          </button>
        </div>`;
      container.appendChild(card);
    });
  }

  // ── AUTO SCAN TOGGLE ───────────────────────
  async function toggleAutoScan(checkbox, accountId) {
    const enabled     = checkbox.checked;
    const intervalMin = parseInt(document.getElementById(`interval_${accountId}`).value);
    const statusEl    = document.getElementById(`autoStatus_${accountId}`);
    const selectEl    = document.getElementById(`interval_${accountId}`);
    const nextEl      = document.getElementById(`nextScan_${accountId}`);

    try {
      const res = await fetch(`/aws/set-auto-scan/${accountId}`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + localStorage.getItem('token')
        },
        body: JSON.stringify({ enabled, interval_min: intervalMin })
      });

      const data = await res.json();

      if (res.ok) {
        // Update UI
        statusEl.className = `auto-scan-status ${enabled ? 'on' : 'off'}`;
        statusEl.innerText = enabled ? 'ON' : 'OFF';
        selectEl.classList.toggle('active', enabled);

        if (enabled && data.next_scan_at) {
          nextEl.innerText = formatNextScan(data.next_scan_at);
          nextEl.classList.add('visible');
        } else {
          nextEl.innerText = '';
          nextEl.classList.remove('visible');
        }

        showToast(
          enabled ? `Auto scan enabled — every ${intervalMin} min` : 'Auto scan disabled',
          enabled ? 'success' : 'error'
        );
      } else {
        // Revert toggle on failure
        checkbox.checked = !enabled;
        showToast(data.message || 'Failed to update', 'error');
      }
    } catch (e) {
      checkbox.checked = !enabled;
      showToast('Network error', 'error');
    }
  }

  // ── INTERVAL CHANGE (when toggle is ON) ───
  async function changeInterval(accountId) {
    const selectEl  = document.getElementById(`interval_${accountId}`);
    const intervalMin = parseInt(selectEl.value);
    const nextEl    = document.getElementById(`nextScan_${accountId}`);

    // Only update if auto scan is currently ON
    const isOn = selectEl.classList.contains('active');
    if (!isOn) return;

    try {
      const res = await fetch(`/aws/set-auto-scan/${accountId}`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + localStorage.getItem('token')
        },
        body: JSON.stringify({ enabled: true, interval_min: intervalMin })
      });

      const data = await res.json();
      if (res.ok && data.next_scan_at) {
        nextEl.innerText = formatNextScan(data.next_scan_at);
        nextEl.classList.add('visible');
        showToast(`Interval updated — every ${intervalMin} min`, 'success');
      }
    } catch (e) {
      showToast('Network error', 'error');
    }
  }

  // ── ADD MODAL ──────────────────────────────
  function openAddModal() {
    document.getElementById('inp_name').value    = '';
    document.getElementById('inp_arn').value     = '';
    document.getElementById('inp_region').value  = '';
    document.getElementById('add_err').innerText = '';
    document.getElementById('addModal').classList.add('show');
    setTimeout(() => document.getElementById('inp_name').focus(), 100);
  }
  function closeAddModal() {
    document.getElementById('addModal').classList.remove('show');
  }

  async function addAccount() {
    const name   = document.getElementById('inp_name').value.trim();
    const arn    = document.getElementById('inp_arn').value.trim();
    const region = document.getElementById('inp_region').value.trim();
    const errEl  = document.getElementById('add_err');
    const btn    = document.getElementById('saveBtn');

    if (!name || !arn || !region) { errEl.innerText = 'All fields are required.'; return; }
    if (!arn.startsWith('arn:aws:iam::')) {
      errEl.innerText = 'Invalid ARN format. Must start with arn:aws:iam::'; return;
    }

    btn.disabled = true; btn.innerText = 'Connecting...';
    try {
      const res  = await fetch('/aws/add-account', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + localStorage.getItem('token')
        },
        body: JSON.stringify({ account_name: name, role_arn: arn, region })
      });
      const data = await res.json();
      if (res.ok) {
        closeAddModal();
        loadAccounts();
        showToast('Account connected successfully!', 'success');
      } else {
        errEl.innerText = data.message || 'Error adding account.';
      }
    } catch (e) {
      errEl.innerText = 'Network error. Please try again.';
    }
    btn.disabled = false; btn.innerText = 'Connect Account';
  }

  // ── VIEW MODAL ─────────────────────────────
  function openViewModal(acc) {
    if (typeof acc === 'string') acc = JSON.parse(acc);
    fullArn = acc.role_arn || 'Not available';
    arnVisible = false;
    selectedDeleteId = acc.id;

    document.getElementById('vName').innerText        = acc.account_name || '—';
    document.getElementById('vRegion').innerText      = acc.region || '—';
    document.getElementById('vArn').innerText         = maskArn(fullArn);
    document.getElementById('arnToggleBtn').innerText = 'Show';
    document.getElementById('vLastScan').innerText    = 'Loading...';

    fetch(`/aws/scan-history/${acc.id}`, {
      headers: { Authorization: 'Bearer ' + localStorage.getItem('token') }
    }).then(r => r.json()).then(data => {
      const h = data.history;
      if (h && h.length) {
        const latest = h[h.length - 1];
        document.getElementById('vLastScan').innerText =
          new Date(latest.time).toLocaleString() +
          ` — H:${latest.high} M:${latest.medium} L:${latest.low}`;
      } else {
        document.getElementById('vLastScan').innerText = 'No scans yet';
      }
    }).catch(() => {
      document.getElementById('vLastScan').innerText = 'No scans yet';
    });

    document.getElementById('vDeleteBtn').onclick = () => deleteAccount(acc.id, true);
    document.getElementById('viewModal').classList.add('show');
  }

  function closeViewModal() {
    document.getElementById('viewModal').classList.remove('show');
  }

  // ── ARN TOGGLE ─────────────────────────────
  function maskArn(arn) {
    if (!arn || arn === 'Not available') return 'Not available';
    if (arn.length <= 24) return arn;
    return arn.substring(0, 20) + '••••••••••••';
  }
  function toggleArn() {
    arnVisible = !arnVisible;
    document.getElementById('vArn').innerText =
      arnVisible ? fullArn : maskArn(fullArn);
    document.getElementById('arnToggleBtn').innerText = arnVisible ? 'Hide' : 'Show';
  }

  // ── DELETE ─────────────────────────────────
  async function deleteAccount(id, fromModal = false) {
    if (!confirm('Delete this account? All scan data will be lost.')) return;
    const res = await fetch(`/aws/delete-account/${id}`, {
      method: 'DELETE',
      headers: { Authorization: 'Bearer ' + localStorage.getItem('token') }
    });
    if (res.ok) {
      if (fromModal) closeViewModal();
      loadAccounts();
      showToast('Account deleted.', 'error');
    }
  }

  // ── CLICK OUTSIDE TO CLOSE ─────────────────
  document.getElementById('addModal').addEventListener('click', e => {
    if (e.target === document.getElementById('addModal')) closeAddModal();
  });
  document.getElementById('viewModal').addEventListener('click', e => {
    if (e.target === document.getElementById('viewModal')) closeViewModal();
  });

  loadAccounts();

  // ── REFRESH NEXT SCAN TIMERS EVERY MINUTE ──
  setInterval(() => {
    document.querySelectorAll('[id^="nextScan_"]').forEach(el => {
      if (el.classList.contains('visible') && el.dataset.nextAt) {
        el.innerText = formatNextScan(el.dataset.nextAt);
      }
    });
  }, 60000);
</script>

{% endblock %}
