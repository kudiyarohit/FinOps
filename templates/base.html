<!DOCTYPE html>
<html>
<head>
    <title>FinOps</title>
    <style>

    *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    body {
        font-family: 'Segoe UI', Arial, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        min-height: 100vh;
    }

    /* ── LAYOUT ── */
    .layout {
        display: flex;
        min-height: 100vh;
    }

    /* ── SIDEBAR ── */
    .sidebar {
        width: 210px;
        min-height: 100vh;
        position: fixed;
        top: 0;
        left: 0;
        background: linear-gradient(180deg, #020617, #0f172a);
        padding: 24px 16px;
        box-shadow: 4px 0 20px rgba(0,0,0,0.4);
        z-index: 10;
        display: flex;
        flex-direction: column;
        gap: 6px;
    }

    .sidebar-logo {
        font-size: 20px;
        font-weight: 700;
        color: #38bdf8;
        margin-bottom: 28px;
        padding-left: 6px;
        letter-spacing: 0.5px;
    }

    .sidebar a {
        display: block;
        padding: 11px 16px;
        text-decoration: none;
        color: #94a3b8;
        border-radius: 10px;
        font-size: 14px;
        background: transparent;
        transition: all 0.2s ease;
        white-space: nowrap;
    }

    .sidebar a:hover {
        background: rgba(59,130,246,0.12);
        color: #e2e8f0;
        transform: translateX(3px);
    }

    .sidebar a.active {
        background: linear-gradient(90deg, #1d4ed8, #2563eb);
        color: #fff;
        font-weight: 600;
        box-shadow: 0 4px 14px rgba(37,99,235,0.35);
    }

    /* ── MAIN ── */
    .main {
        margin-left: 210px;
        flex: 1;
        display: flex;
        flex-direction: column;
        min-width: 0;
    }

    /* ── NAVBAR ── */
    .navbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 14px 28px;
        background: rgba(2,6,23,0.85);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid rgba(255,255,255,0.06);
        position: sticky;
        top: 0;
        z-index: 20;
        min-height: 60px;
    }

    .navbar-brand { display: flex; flex-direction: column; gap: 2px; }

    .logo {
        font-weight: 700;
        font-size: 20px;
        color: #38bdf8;
        text-decoration: none;
        line-height: 1;
    }

    .logo-sub {
        font-size: 11px;
        color: #475569;
        line-height: 1;
    }

    .nav-btn {
        background: #f59e0b;
        padding: 7px 18px;
        border: none;
        color: #fff;
        font-weight: 600;
        font-size: 13px;
        cursor: pointer;
        border-radius: 8px;
        transition: background 0.2s;
    }

    .nav-btn:hover { background: #d97706; }

    /* ── CONTENT ── */
    .content {
        padding: 28px;
        width: 100%;
        flex: 1;
    }

    /* ── DASHBOARD TITLE ── */
    .dashboard h2 {
        font-size: 22px;
        font-weight: 600;
        color: #f1f5f9;
        margin-bottom: 6px;
    }

    /* ── PIPELINE ── */
    .pipeline {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 16px;
        margin: 20px 0;
    }

    .pipe {
        position: relative;
        padding: 20px 20px 20px 24px;
        border-radius: 14px;
        background: linear-gradient(145deg, #020617, #0f172a);
        border: 1px solid rgba(255,255,255,0.06);
        transition: transform 0.25s ease, box-shadow 0.25s ease;
        overflow: hidden;
    }

    .pipe::before {
        content: "";
        position: absolute;
        left: 0; top: 12%; height: 76%;
        width: 4px;
        border-radius: 0 4px 4px 0;
    }

    .pipe.total::before  { background: #3b82f6; }
    .pipe.high::before   { background: #ef4444; }
    .pipe.medium::before { background: #f59e0b; }
    .pipe.low::before    { background: #22c55e; }

    .pipe h4 {
        font-size: 12px;
        font-weight: 500;
        color: #64748b;
        text-transform: uppercase;
        letter-spacing: 0.6px;
        margin-bottom: 10px;
    }

    .pipe p {
        font-size: 28px;
        font-weight: 700;
        color: #f1f5f9;
        line-height: 1;
    }

    .pipe:hover { transform: translateY(-4px); }
    .pipe.total:hover  { box-shadow: 0 16px 36px rgba(59,130,246,0.2); }
    .pipe.high:hover   { box-shadow: 0 16px 36px rgba(239,68,68,0.2); }
    .pipe.medium:hover { box-shadow: 0 16px 36px rgba(245,158,11,0.2); }
    .pipe.low:hover    { box-shadow: 0 16px 36px rgba(34,197,94,0.2); }

    /* ── TOP SECTION (gauge + history) ── */
    .top-section {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        margin-top: 4px;
        margin-bottom: 28px;
    }

    .gauge-box {
        background: linear-gradient(145deg, #020617, #0f172a);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 16px;
        padding: 22px 24px;
    }

    .gauge-box h3 {
        font-size: 12px;
        font-weight: 500;
        color: #64748b;
        text-transform: uppercase;
        letter-spacing: 0.6px;
        margin-bottom: 16px;
    }

    /* ── ACCOUNT SECTION ── */
    .account-section {
        margin-bottom: 32px;
    }

    .account-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 14px;
        padding-bottom: 12px;
        border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .account-title {
        font-size: 15px;
        font-weight: 600;
        color: #e2e8f0;
    }

    .account-sub {
        font-size: 12px;
        color: #475569;
        margin-top: 3px;
    }

    /* ── FINDINGS GRID ── */
    .findings-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 16px;
    }

    /* ── RESULT CARD ── */
    .result-card {
        background: linear-gradient(145deg, #020617, #0f172a);
        backdrop-filter: blur(10px);
        border-radius: 12px;
        padding: 16px 18px;
        position: relative;
        overflow: hidden;
        border: 1px solid rgba(255,255,255,0.05);
        transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .result-card::before {
        content: "";
        position: absolute;
        left: 0; top: 0;
        width: 3px; height: 100%;
    }

    .result-card.high::before   { background: #ef4444; }
    .result-card.medium::before { background: #f59e0b; }
    .result-card.low::before    { background: #22c55e; }

    .result-card:hover { transform: translateY(-5px); }
    .result-card.high:hover   { box-shadow: 0 16px 36px rgba(239,68,68,0.2); }
    .result-card.medium:hover { box-shadow: 0 16px 36px rgba(245,158,11,0.2); }
    .result-card.low:hover    { box-shadow: 0 16px 36px rgba(34,197,94,0.2); }

    /* ── CARD INTERNALS ── */
    .result-title {
        font-size: 14px;
        font-weight: 600;
        color: #f1f5f9;
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 10px;
        margin-bottom: 8px;
    }

    .badge {
        font-size: 10px;
        padding: 2px 8px;
        border-radius: 20px;
        background: rgba(255,255,255,0.08);
        color: #94a3b8;
        white-space: nowrap;
        flex-shrink: 0;
    }

    .meta {
        font-size: 12px;
        color: #475569;
        margin-top: 4px;
        line-height: 1.5;
    }

    .desc {
        font-size: 13px;
        margin-top: 10px;
        color: #cbd5e1;
        line-height: 1.6;
    }

    .risk  { font-size: 12px; margin-top: 8px; }
    .reco  { font-size: 12px; margin-top: 6px; color: #38bdf8; line-height: 1.5; }

    .aws-link {
        display: inline-block;
        margin-top: 10px;
        font-size: 12px;
        color: #60a5fa;
        text-decoration: none;
        border-bottom: 1px solid transparent;
        transition: border-color 0.2s;
    }

    .aws-link:hover { border-color: #60a5fa; }

    </style>
</head>

<body>
<div class="layout">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="sidebar-logo">FinOps</div>
        <a href="/dashboard" class="{{ 'active' if request.path == '/dashboard' else '' }}">Dashboard</a>
        <a href="/accounts"  class="{{ 'active' if request.path == '/accounts'  else '' }}">Accounts</a>
        <a href="/manual"  class="{{ 'active' if request.path == '/manual'  else '' }}">Manual Scan</a>
        <a href="/history"   class="{{ 'active' if request.path == '/history'   else '' }}">History</a>
    </div>

    <!-- MAIN -->
    <div class="main">

        <!-- NAVBAR -->
        <div class="navbar">
            <div class="navbar-brand">
                <a href="#" class="logo" onclick="goHome()">FinOps</a>
                <span class="logo-sub">Cloud Security & Cost Control</span>
            </div>
            <button class="nav-btn" onclick="goLogin()">Logout</button>
        </div>

        <!-- CONTENT -->
        <div class="content">
            {% block content %}{% endblock %}
        </div>

    </div>
</div>

<script>
function goLogin(){
    localStorage.removeItem("token");
    window.location.href = "/login";
}
function goHome(){
    window.location.href = localStorage.getItem("token") ? "/dashboard" : "/";
}
</script>

</body>
</html>
